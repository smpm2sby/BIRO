<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Biro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .radio-custom:checked + label { background-color: #3b82f6; color: white; border-color: #3b82f6; }
    </style>
</head>
<body class="text-gray-800">

    <div id="toast" class="fixed top-4 right-4 z-50 hidden transform transition-all duration-300">
        <div class="bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg flex items-center space-x-3">
            <i id="toast-icon" class="fas fa-info-circle"></i>
            <span id="toast-message" class="font-medium">Notifikasi</span>
        </div>
    </div>

    <div id="app" class="min-h-screen">
        <div id="login-page" class="flex items-center justify-center min-h-screen p-4 fade-in">
            <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-gray-900">Portal Absensi Biro</h1>
                </div>
                <form id="login-form" class="space-y-5">
                    <select id="login-role" class="w-full px-4 py-2.5 rounded-lg border border-gray-300">
                        <option value="guru">Guru Biro</option>
                        <option value="admin">Administrator</option>
                    </select>
                    <input type="text" id="login-username" required placeholder="Username" class="w-full px-4 py-2.5 rounded-lg border border-gray-300">
                    <input type="password" id="login-password" required placeholder="Password" class="w-full px-4 py-2.5 rounded-lg border border-gray-300">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg">Masuk</button>
                </form>
            </div>
        </div>

        <div id="guru-page" class="hidden min-h-screen bg-gray-50 fade-in">
            <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center sticky top-0 z-40">
                <div class="flex items-center space-x-3">
                    <h2 class="font-bold text-lg text-gray-800">Panel Guru</h2>
                </div>
                <div class="flex items-center space-x-4">
                    <!-- Menampilkan Nama Guru dan Mapel -->
                    <div id="guru-name" class="text-right hidden sm:block">
                        <span class="text-xs text-gray-400 block" id="guru-mapel-text">-</span>
                        <span class="font-bold text-gray-700" id="guru-name-text">Nama Guru</span>
                    </div>
                    <button onclick="logout()" class="text-red-500 text-sm">Keluar</button>
                </div>
            </nav>
            <!-- ... (sisa kode form absen) ... -->
        </div>
    </div>

    <script>
        // ... (fungsi lainnya)

        function proceedLogin(user) {
            showToast(`Selamat datang, ${user.name}`, 'success');
            if (user.role === 'guru') {
                document.getElementById('guru-name-text').textContent = user.name;
                document.getElementById('guru-mapel-text').textContent = user.mapel || '-';
                showPage('guru-page');
            } else {
                document.getElementById('admin-name').textContent = user.name;
                showPage('admin-page');
                loadReport();
            }
        }
        // ... (fungsi lainnya)
    </script>
</body>
</html>
